  l4s-fqcodel-fairness:
    example_cmd:
      - "diffserv-l4s-fqcodel-comparison --simTime=60 --warmup=10 --bulkSenders=40 --mode=l4s-wred --output=output/ns3/diffserv-l4s-fqcodel-comparison"
      - "diffserv-l4s-fqcodel-comparison --simTime=60 --warmup=10 --bulkSenders=40 --mode=l4s-coupled-only --output=output/ns3/diffserv-l4s-fqcodel-comparison"
      - "diffserv-l4s-fqcodel-comparison --simTime=60 --warmup=10 --bulkSenders=40 --mode=l4s-fqcodel-classic --output=output/ns3/diffserv-l4s-fqcodel-comparison"
      - "diffserv-l4s-fqcodel-comparison --simTime=60 --warmup=10 --bulkSenders=40 --mode=fqcodel --output=output/ns3/diffserv-l4s-fqcodel-comparison"
      - "diffserv-l4s-fqcodel-comparison --simTime=60 --warmup=10 --bulkSenders=40 --mode=classic-only --output=output/ns3/diffserv-l4s-fqcodel-comparison"
    output_glob: "output/ns3/diffserv-l4s-fqcodel-comparison/*"
    arms: overlay-all
    plots:
      - type: steady-state-bar
        output_name: per-flow-goodput-cv
        csv_glob: "N40/bulk-goodput.csv"
        csv_opts: {sep: ",", header: 0}
        x_col: flow_id
        y_col: goodput_mbps
        y_aggregate: cv
        series_label_map:
          l4s-wred: "DualPI2 (WRED classic)"
          l4s-coupled-only: "DualPI2 (coupled-only)"
          l4s-fqcodel-classic: "DualPI2 (FqCoDel classic)"
          fqcodel: "FqCoDel"
          classic-only: "FIFO (no AQM)"
        title: "Per-flow goodput CV @ N=40 — bulk-flow fairness across compositions"
        xlabel: "AQM mode (see legend)"
        ylabel: "Coefficient of variation (lower = fairer)"
        calibration:
          source: measured
          notes: >
            Lower CV = more uniform per-flow goodput share at N=40.
            DualPI2 modes share one L4 lane (per-flow uniformity via
            DCTCP+coupled marking). FqCoDel isolates per sub-flow.
            classic-only has no AQM; per-flow uniformity may be poor
            under drop-driven backoff.
