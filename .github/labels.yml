# Label taxonomy for Stratum (ns-3 QoS substrate).
# Prefix-namespaced; consume via EndBug/label-sync or
# crazy-max/ghaction-github-labeler in a GitHub Action.

# === client/* — which substrate client does this concern? ===
- name: "client/diffserv"
  color: "1d76db"
  description: "Classical-DiffServ client (meters, schedulers, PHBs)"
- name: "client/l4s"
  color: "5319e7"
  description: "L4S client (DualPI2, coupled marking, ECT(1))"
- name: "client/cake"
  color: "0e8a16"
  description: "CAKE client (tin modes, FqCobalt, ACK filter)"
- name: "client/wireless"
  color: "fbca04"
  description: "DS4 + WiFi integration"
- name: "client/registry"
  color: "c5def5"
  description: "AQM / scheduler registry and extension surface"

# === kind/* — what kind of issue is this? ===
- name: "kind/bug"
  color: "d73a4a"
  description: "Unexpected behaviour or defect"
- name: "kind/feature"
  color: "a2eeef"
  description: "New capability request"
- name: "kind/docs"
  color: "0075ca"
  description: "Documentation: handbook, user guide, ADRs, code comments"
- name: "kind/recipe-request"
  color: "0075ca"
  description: "Request for a new recipe or worked example"
- name: "kind/naming"
  color: "ededed"
  description: "Stratum codename feedback"
- name: "kind/show-and-tell"
  color: "76dba9"
  description: "Adoption report — used in a paper, project, or evaluation"
- name: "kind/adoption"
  color: "76dba9"
  description: "Paired with show-and-tell; tracks real-world usage signals"
- name: "kind/rfc-conformance"
  color: "bfd4f2"
  description: "RFC vector failure or interpretation question"
- name: "kind/regression"
  color: "b60205"
  description: "Behaviour worked previously; needs bisect"

# === status/* — workflow state ===
- name: "status/triage"
  color: "fef2c0"
  description: "Awaiting initial review"
- name: "status/in-progress"
  color: "fbca04"
  description: "Being worked on"
- name: "status/blocked"
  color: "e99695"
  description: "Cannot proceed without external input or unblock"
- name: "status/needs-info"
  color: "d4c5f9"
  description: "Awaiting reporter response"

# === priority/* — urgency ===
- name: "priority/critical"
  color: "b60205"
  description: "Blocks release or correctness"
- name: "priority/normal"
  color: "fbca04"
  description: "Standard backlog"
- name: "priority/low"
  color: "0e8a16"
  description: "Nice to have"

# === GitHub-special ===
- name: "good first issue"
  color: "7057ff"
  description: "Suitable for a first-time contributor"
- name: "help wanted"
  color: "008672"
  description: "Maintainer would value external help here"
